<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Brian Strickland is an AI Automation Architect, Platform Builder, and cybersecurity-minded systems designer." />
  <title>{{ if .IsHome }}Brian Strickland{{ else }}{{ .Title }} | Brian Strickland{{ end }}</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="{{ if .IsHome }}home-page{{ else }}inner-page{{ end }}">
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{ partial "header.html" . }}

  <div class="site-shell">
    <main id="main-content" class="content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  {{ partial "footer.html" . }}
</body>
</html>
